name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR/branch on new pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint, type-check)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # tauri::generate_context!() checks at compile time that
      # frontendDist (../dist) exists, so the frontend has to be
      # built before any cargo step that compiles the desktop feature.
      - run: npm ci
      - run: npm run build
      - run: cargo fmt --all --manifest-path src-tauri/Cargo.toml -- --check
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml --all-features
      # Also exercise the headless feature path so the no-default-features
      # build (used by tests + downstream consumers) doesn't drift.
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --no-default-features --all-targets -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml --no-default-features

  audit:
    name: Dependency audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Audit Rust deps
        run: cargo audit
        working-directory: src-tauri
      - name: Audit npm deps
        run: npm audit --audit-level=high
        # npm audit's exit code is non-zero on findings; allow this to fail loud
        # but not block until we have a triage process in place.
        continue-on-error: true

  build:
    name: Build (${{ matrix.platform }})
    needs: [frontend, rust]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - run: npm ci
      - name: Build Tauri app
        env:
          # linuxdeploy bundles a `strip` that pre-dates ELF .relr.dyn
          # sections; suppress its stripping so the AppImage build
          # succeeds on modern binutils.
          NO_STRIP: true
        # CI verifies the build compiles and bundles correctly. It does
        # NOT need to produce signed updater artifacts — those are the
        # exclusive job of release.yml, which has the
        # TAURI_SIGNING_PRIVATE_KEY secret. Override
        # `bundle.createUpdaterArtifacts` to false here so the bundler
        # doesn't refuse to run on the missing private key.
        run: npm run tauri build -- --target ${{ matrix.target }} --config '{"bundle":{"createUpdaterArtifacts":false}}'
