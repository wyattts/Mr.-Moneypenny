name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and release (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: appimage
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact: macos-x86_64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - run: npm ci
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing/notarization (set when sponsorship covers Apple Dev cost)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows signing (set when sponsorship covers Authenticode cert)
          # WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          # WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: "Mr. Moneypenny ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            **macOS / Windows builds are unsigned in this release.** You may see a Gatekeeper or SmartScreen warning. See [docs/distribution.md](https://github.com/${{ github.repository }}/blob/main/docs/distribution.md) for verification instructions and how to bypass.
          releaseDraft: true
          prerelease: false

      - name: Sign AppImage with GPG
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_SIGNING_KEY" ]; then
            echo "GPG_SIGNING_KEY not set; skipping AppImage signing."
            exit 0
          fi
          echo "$GPG_SIGNING_KEY" | gpg --batch --import
          for f in src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage; do
            gpg --batch --yes --pinentry-mode loopback \
                --passphrase "$GPG_PASSPHRASE" \
                --detach-sign --armor "$f"
          done
