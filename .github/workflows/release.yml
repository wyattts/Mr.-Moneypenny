name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and release (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: appimage
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact: macos-x86_64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - run: npm ci
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # linuxdeploy bundles a `strip` that pre-dates ELF .relr.dyn
          # sections; suppress its stripping so the AppImage build
          # succeeds on modern binutils.
          NO_STRIP: true
          # macOS signing/notarization (set when sponsorship covers Apple Dev cost)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows signing (set when sponsorship covers Authenticode cert)
          # WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          # WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: "Mr. Moneypenny ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            **macOS / Windows builds are unsigned in this release.** You may see a Gatekeeper or SmartScreen warning. See [docs/distribution.md](https://github.com/${{ github.repository }}/blob/main/docs/distribution.md) for verification instructions and how to bypass.
          releaseDraft: true
          prerelease: false

      - name: Sign AppImage with GPG
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_SIGNING_KEY" ]; then
            echo "GPG_SIGNING_KEY not set; skipping AppImage signing."
            exit 0
          fi
          # Configure gpg-agent to allow loopback pinentry. Without
          # this the agent falls back to a curses pinentry that the
          # headless runner can't open ("Inappropriate ioctl for
          # device"). With it, signing works regardless of whether
          # the key has a passphrase.
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye || true
          echo "$GPG_SIGNING_KEY" | gpg --batch --import
          for f in src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage; do
            if [ -n "$GPG_PASSPHRASE" ]; then
              gpg --batch --yes --pinentry-mode loopback \
                  --passphrase "$GPG_PASSPHRASE" \
                  --detach-sign --armor "$f"
            else
              # No passphrase set on the signing key — feed an empty
              # passphrase via fd 0 with --pinentry-mode loopback. gpg
              # rejects bare `--passphrase ""` ("No passphrase given")
              # and rejects no --passphrase + no TTY ("Inappropriate
              # ioctl"); piping empty stdin to --passphrase-fd 0 is
              # the form gpg accepts for no-passphrase keys.
              echo "" | gpg --batch --yes --pinentry-mode loopback \
                  --passphrase-fd 0 \
                  --detach-sign --armor "$f"
            fi
          done

      - name: Upload AppImage signature to release
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # tauri-action uploads the AppImage itself but not our detached
          # GPG signature. Push the .asc into the same draft release so
          # users can verify integrity without an extra step.
          for f in src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.asc; do
            [ -e "$f" ] || continue
            gh release upload "${{ github.ref_name }}" "$f" --clobber
          done
